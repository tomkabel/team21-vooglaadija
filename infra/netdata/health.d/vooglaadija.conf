# NetData Health Alerts Configuration for Vooglaadija
# Location: /etc/netdata/health.d/vooglaadija.conf (mounted via docker-compose)
#
# These alerts monitor the health of the vooglaadija application stack

# ============================================
# Docker Container Health Alerts
# ============================================

template: docker_container_cpu_high
    on: docker.cpu_usage_percent
    os: linux
    hosts: *
    families: *
    lookup: average -5m percentage foreach
    units: %
    every: 10s
    warn: $this > 80
    crit: $this > 95
    delay: up 5m down 1m
    info: Container CPU usage is elevated
    to: sysadmin

template: docker_container_memory_high
    on: docker.mem_usage_percent
    os: linux
    hosts: *
    families: *
    lookup: average -5m percentage foreach
    units: %
    every: 10s
    warn: $this > 80
    crit: $this > 95
    delay: up 5m down 1m
    info: Container memory usage is elevated
    to: sysadmin

template: docker_container_network_errors
    on: docker.net_net
    os: linux
    hosts: *
    families: *
    lookup: average -1m sum foreach
    units: errors/s
    every: 10s
    warn: $this > 0
    crit: $this > 10
    delay: up 1m down 30s
    info: Container network errors detected
    to: sysadmin

template: docker_containers_down
    on: docker.containers
    os: linux
    hosts: *
    families: *
    lookup: average -1m count foreach
    units: containers
    every: 30s
    warn: $this < 4
    crit: $this < 3
    info: One or more containers may be down
    to: sysadmin

# ============================================
# System Resource Alerts
# ============================================

template: system_cpu_utilization_high
    on: system.cpu
    os: linux
    hosts: *
    families: *
    lookup: average -5m percentage foreach
    units: %
    every: 10s
    warn: $this > 80
    crit: $this > 95
    delay: up 5m down 2m
    info: System CPU utilization is high
    to: sysadmin

template: system_ram_usage_high
    on: system.ram
    os: linux
    hosts: *
    families: *
    lookup: average -5m at -5m percentage
    units: %
    every: 10s
    warn: $this > 80
    crit: $this > 95
    delay: up 5m down 2m
    info: System RAM usage is high
    to: sysadmin

template: system_disk_space_low
    on: disk.space
    os: linux
    hosts: *
    families: *
    lookup: average -10m at -5m percentage foreach
    units: %
    every: 60s
    warn: $this < 20
    crit: $this < 10
    delay: up 30m down 10m
    info: Disk space is running low on
    to: sysadmin

template: system_disk_io_high
    on: disk.io
    os: linux
    hosts: *
    families: *
    lookup: average -5m sum foreach
    units: KiB/s
    every: 10s
    warn: $this > 100000
    crit: $this > 200000
    delay: up 5m down 1m
    info: Disk I/O is very high
    to: sysadmin

# ============================================
# PostgreSQL Alerts (via docker/postgresql)
# ============================================

template: postgres_connections_high
    on: postgres.connections
    os: linux
    hosts: *
    families: *
    lookup: average -5m max
    units: connections
    every: 30s
    warn: $this > 80
    crit: $this > 150
    delay: up 5m down 2m
    info: PostgreSQL connection count is high
    to: sysadmin

# Note: postgres_replication_lag alert removed - the custom PostgreSQL queries
# required to expose postgres.replication_lag metric are not enabled in go.d.conf
# If you enable custom PostgreSQL queries in infra/netdata/go.d.conf, re-add this template

