template: postgres_transactions_rate_high
    on: postgres.transactions_rate
    os: linux
    hosts: *
    families: *
    lookup: average -5m sum
    units: txn/s
    every: 30s
    warn: $this > 1000
    crit: $this > 5000
    delay: up 2m down 1m
    info: PostgreSQL transaction rate is very high
    to: sysadmin

# ============================================
# Redis Alerts (via docker/redis)
# ============================================

template: redis_memory_high
    on: redis.mem
    os: linux
    hosts: *
    families: *
    lookup: average -5m max
    units: MiB
    every: 30s
    warn: $this > 200
    crit: $this > 240
    delay: up 5m down 1m
    info: Redis memory usage is high
    to: sysadmin

template: redis_connected_clients_high
    on: redis.clients
    os: linux
    hosts: *
    families: *
    lookup: average -5m max
    units: clients
    every: 30s
    warn: $this > 100
    crit: $this > 200
    delay: up 5m down 1m
    info: Redis connected client count is high
    to: sysadmin

template: redis_commands_rate_high
    on: redis.command_calls
    os: linux
    hosts: *
    families: *
    lookup: average -5m sum
    units: calls/s
    every: 30s
    warn: $this > 10000
    crit: $this > 50000
    delay: up 5m down 1m
    info: Redis command rate is very high
    to: sysadmin

template: redis_evicted_keys
    on: redis.evicted_keys
    os: linux
    hosts: *
    families: *
    lookup: average -5m sum
    units: keys/s
    every: 30s
    warn: $this > 0
    crit: $this > 100
    delay: up 1m down 30s
    info: Redis key eviction detected - memory pressure
    to: sysadmin

# ============================================
# Nginx Alerts (if using nginx reverse proxy)
# ============================================

template: nginx_requests_high
    on: nginx.requests
    os: linux
    hosts: *
    families: *
    lookup: average -5m sum
    units: req/s
    every: 30s
    warn: $this > 100
    crit: $this > 500
    delay: up 5m down 1m
    info: Nginx request rate is high
    to: sysadmin

template: nginx_connection_errors
    on: nginx.connection_errors
    os: linux
    hosts: *
    families: *
    lookup: average -1m sum
    units: errors/s
    every: 30s
    warn: $this > 1
    crit: $this > 10
    delay: up 1m down 30s
    info: Nginx connection errors detected
    to: sysadmin

# ============================================
# Application-Specific Alerts
# ============================================

template: vooglaadija_api_response_time_high
    on: http.webgo.response_time
    os: linux
    hosts: *
    families: *
    lookup: average -5m percentile 95
    units: ms
    every: 10s
    warn: $this > 500
    crit: $this > 2000
    delay: up 2m down 30s
    info: API response time is elevated
    to: sysadmin

template: vooglaadija_api_error_rate_high
    on: http.webgo.requests
    os: linux
    hosts: *
    families: *
    lookup: average -5m sum foreach code 4xx 5xx
    units: req/s
    every: 10s
    warn: $this > 5
    crit: $this > 20
    delay: up 1m down 30s
    info: API error rate is elevated
    to: sysadmin

# ============================================
# Network Alerts
# ============================================

template: network_interface_errors
    on: net.net
    os: linux
    hosts: *
    families: *
    lookup: average -1m sum foreach
    units: errors/s
    every: 10s
    warn: $this > 0
    crit: $this > 100
    delay: up 1m down 30s
    info: Network interface errors detected
    to: sysadmin

template: network_bandwidth_high
    on: net.net
    os: linux
    hosts: *
    families: *
    lookup: average -5m sum
    units: KiB/s
    every: 10s
    warn: $this > 100000
    crit: $this > 500000
    delay: up 5m down 1m
    info: Network bandwidth usage is very high
    to: sysadmin

# ============================================
# Process Monitoring
# ============================================

template: uvicorn_process_missing
    on: apps.processes
    os: linux
    hosts: *
    families: uvicorn
    lookup: average -1m count
    units: processes
    every: 30s
    warn: $this < 2
    crit: $this < 1
    delay: up 1m down 30s
    info: Uvicorn process not running
    to: sysadmin

template: worker_process_missing
    on: apps.processes
    os: linux
    hosts: *
    families: worker
    lookup: average -1m count
    units: processes
    every: 30s
    crit: $this < 1
    delay: up 1m down 30s
    info: Worker process not running
    to: sysadmin
