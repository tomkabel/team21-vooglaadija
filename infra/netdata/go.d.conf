# NetData Go.d Plugin Configuration
# Location: /etc/netdata/go.d/go.d.conf (mounted via docker-compose)
#
# This configures which collectors NetData uses to gather metrics
# for more details, see: https://learn.netdata.cloud/docs/observing-system/collectors

# Enable or disable the entire go.d plugin
enabled: yes

# Module configurations
modules:
  # ============================================
  # Container Monitoring
  # ============================================
  docker:
    name: docker
    # Auto-detection; set to 'yes' to force enable
    autoselection:
      enabled: yes
    # Path to docker socket (default: /var/run/docker.sock)
    socket_path: /var/run/docker.sock

  # ============================================
  # Web Server Monitoring
  # ============================================
  nginx:
    name: nginx
    # Auto-detection; for manual config:
    # sites:
    #   - enabled: yes
    #     url: http://127.0.0.1:80/stub_status

  # ============================================
  # Database Monitoring
  # ============================================
  postgres:
    name: postgres
    # Auto-detection via docker socket
    # For manual config, uncomment and modify:
    # dsn:
    #   - name: local
    #     data_source_name: "postgres://postgres:postgres@127.0.0.1:5432/ytprocessor?sslmode=disable"
    #     # Alternative formats:
    #     # "host=127.0.0.1 port=5432 user=postgres password=postgres dbname=ytprocessor sslmode=disable"
    #     # "postgresql://postgres:postgres@127.0.0.1:5432/ytprocessor"
    # queries:
    #   - enabled: yes
    #     name: localdb
    #     statement: |
    #       SELECT 
    #         sum(numbackfill) as numbackfill,
    #         sum(numbbackfill) as numbackfill
    #       FROM pg_stat_bgwriter

  # ============================================
  # Cache/Redis Monitoring
  # ============================================
  redis:
    name: redis
    # Auto-detection via docker socket
    # For manual config, uncomment and modify:
    # sockets:
    #   - name: local
    #     address: "redis://:your_redis_password@127.0.0.1:6379"
    #     # Or use socket file:
    #     # socket: /var/run/redis/redis.sock
    #     # password: your_redis_password

  # ============================================
  # System Monitoring (always enabled by default)
  # ============================================
  # These modules are always active as they're core system metrics
  
  cpu:
    name: cpu

  disk:
    name: disk

  memory:
    name: memory

  net:
    name: net

  processes:
    name: processes
    # Enable process monitoring
    command: auto
    # Monitoring interval in seconds
    interval: 10

  services:
    name: services

  users:
    name: users

  # ============================================
  # Journal / Log Monitoring
  # ============================================
  # Note: systemd journal logs are collected via the journalsd collector
  # configured separately in go.d/journalsd.conf

# ============================================
# Logging Configuration for NetData
# ============================================
# Uncomment for debug logging:
# log_level: debug

# ============================================
# Performance Tuning
# ============================================
# Default refresh interval for all modules
# interval: 10

# Maximum number of metrics to buffer
# This is useful for high-cardinality environments
# max_procs: 4
