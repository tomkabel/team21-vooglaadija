services:
  backup:
    image: postgres:15
    container_name: ytprocessor-backup
    volumes:
      - ./backup.sh:/usr/local/bin/backup.sh:ro
      - ./backup-data:/var/backup/ytprocessor
    environment:
      PGHOST: ytprocessor-db
      PGPORT: 5432
      PGUSER: ${DB_USER:-postgres}
      PGPASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      PGDATABASE: ${DB_NAME:-ytprocessor}
      BACKUP_OUTPUT_DIR: /var/backup/ytprocessor
      RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    entrypoint: ["/bin/bash", "/usr/local/bin/backup.sh"]
    restart: unless-stopped
    networks:
      - ytprocessor-network
    depends_on:
      - db

  backup-cron:
    image: alpine:latest
    container_name: ytprocessor-backup-cron
    volumes:
      - ./backup.sh:/usr/local/bin/backup.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./backup-data:/var/backup/ytprocessor
    environment:
      PGHOST: ytprocessor-db
      PGPORT: 5432
      PGUSER: ${DB_USER:-postgres}
      PGPASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      PGDATABASE: ${DB_NAME:-ytprocessor}
      BACKUP_OUTPUT_DIR: /var/backup/ytprocessor
      RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    entrypoint: |
      /bin/sh -c "
        echo '0 2 * * * /usr/local/bin/backup.sh >> /var/log/backup.log 2>&1' > /etc/crontabs/root
        crond -f -l 2
      "
    restart: unless-stopped
    networks:
      - ytprocessor-network
    depends_on:
      - db

networks:
  ytprocessor-network:
    name: ytprocessor-network
    external: true
