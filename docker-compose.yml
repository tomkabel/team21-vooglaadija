version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ytprocessor-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://user:pass@db:5432/ytprocessor
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-for-testing-only-min-32-chars}
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      FILE_EXPIRE_HOURS: ${FILE_EXPIRE_HOURS:-24}
      STORAGE_PATH: /app/storage
    volumes:
      - storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: ytprocessor-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://user:pass@db:5432/ytprocessor
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-for-testing-only-min-32-chars}
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      FILE_EXPIRE_HOURS: ${FILE_EXPIRE_HOURS:-24}
      STORAGE_PATH: /app/storage
    volumes:
      - storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; r=redis.from_url('redis://redis:6379'); r.ping()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  db:
    image: postgres:15
    container_name: ytprocessor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: ytprocessor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ytprocessor"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    expose:
      - "5432"

  redis:
    image: redis:7
    container_name: ytprocessor-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    expose:
      - "6379"

  nginx:
    image: nginx:alpine
    container_name: ytprocessor-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  postgres_data:
    name: ytprocessor-postgres-data
  storage:
    name: ytprocessor-storage

networks:
  default:
    name: ytprocessor-network
