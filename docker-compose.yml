# ============================================
# A++ Production Docker-Compose - 2026 Best Practices
# Resource Limits, Security, Observability, GitOps Ready
# ============================================

x-common-env: &common-env
  # Database components (app/config.py constructs URL with proper encoding)
  DB_USER: ${DB_USER:-postgres}
  DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
  DB_NAME: ${DB_NAME:-ytprocessor}
  DB_HOST: ${DB_HOST:-db}
  DB_PORT: ${DB_PORT:-5432}
  # Redis components (app/config.py constructs URL from REDIS_URL or components)
  REDIS_URL: ${REDIS_URL:-}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
  SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
  FILE_EXPIRE_HOURS: ${FILE_EXPIRE_HOURS:-24}
  STORAGE_PATH: /app/storage
  # Observability
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
  OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-vooglaadija}
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-http://otel-collector:4317/v1/traces}
  OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:-http://otel-collector:4317/v1/metrics}
  OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: ${OTEL_EXPORTER_OTLP_LOGS_ENDPOINT:-http://otel-collector:4317/v1/logs}
  # Feature flags
  FEATURE_METRICS_ENABLED: ${FEATURE_METRICS_ENABLED:-true}
  FEATURE_TRACING_ENABLED: ${FEATURE_TRACING_ENABLED:-true}

x-resource-limits: &resource-limits
  # Resource limits - adjust based on actual usage profiling
  deploy:
    resources:
      limits:
        cpus: "1.0"
        memory: 512M
      reservations:
        cpus: "0.25"
        memory: 128M

x-security-context: &security-context
  # Security context - run as non-root, read-only root filesystem
  read_only: true
  tmpfs:
    - /tmp
    - /var/run
    - /var/cache
  # Note: Storage and other writable paths need to be mounted as volumes
  user: "1000:1000"  # appuser:appuser
  # Drop all privileges and add only necessary ones
  cap_drop:
    - ALL
  cap_add:
    - CHOWN  # For entrypoint scripts that might need to chown volumes
    - SETGID
    - SETUID
  # Additional security - use security_opt for no-new-privileges
  security_opt:
    - no-new-privileges=true
  # AppArmor and Seccomp profiles (if available)
  # apparmor: docker-default
  # seccomp: runtime/default

x-healthcheck: &healthcheck
  # Standardized healthcheck template
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 10s

x-logging: &logging
  # Structured logging configuration
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
    compress: "true"
    # Note: podman doesn't support the 'tag' option, removed for compatibility

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
      # BuildKit features for enhanced security
      # context: .
      # dockerfile: Dockerfile
      # target: api
      # ssh: ["default"]  # If needed for private dependencies
    container_name: ytprocessor-api
    restart: unless-stopped
    environment:
      <<: *common-env
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      # Enable observability
      OTEL_PYTHON_TRACER_PROVIDER: otel
      OTEL_PYTHON_METER_PROVIDER: otel
    ports:
      - "8000:8000"
    volumes:
      - storage:/app/storage:Z  # SELinux label
      # Config could be mounted as read-only if needed
      # - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    <<: *resource-limits
    <<: *x-security-context
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(1); s.connect(('localhost', 8000)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    # Networks and aliases for service discovery
    networks:
      ytprocessor-network:
        aliases:
          - api
          - backend

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: ytprocessor-worker
    restart: unless-stopped
    environment:
      <<: *common-env
      WORKER_ID: ${HOSTNAME:-worker-1}
    volumes:
      - storage:/app/storage:Z
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    <<: *resource-limits
    security_opt:
      - no-new-privileges=true
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(1); s.connect(('localhost', 8081)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    networks:
      ytprocessor-network:
        aliases:
          - worker

  db:
    image: postgres:15-alpine  # Removed problematic digest for now
    container_name: ytprocessor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-ytprocessor}
      # PostgreSQL tuning for containers
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - postgres_data:/var/lib/postgresql/data:Z
    logging: *logging
    # Database typically needs more resources
    # Note: PostgreSQL must run as its default user, not overridden by security-context
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-ytprocessor}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Database should be read-only except for data directory
    # This is handled by the volume mount
    networks:
      ytprocessor-network:
        aliases:
          - db

  redis:
    image: redis:7-alpine@sha256:4bfd9eca23339865dc14fe75f6d9ae643f714924623978dd2798f1a673b08f43
    container_name: ytprocessor-redis
    restart: unless-stopped
    # Use exec form for proper signal handling
    command:
      - redis-server
      - --requirepass
      - "${REDIS_PASSWORD}"
      - --appendonly
      - "yes"
      - --maxmemory
      - "256mb"
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - ""  # Disable RDB snapshots (we rely on AOF)
      - --appendfilename
      - "appendonly.aof"
    volumes:
      - redis_data:/data:Z
    environment:
      REDISCLI_AUTH: "${REDIS_PASSWORD}"
    security_opt:
      - no-new-privileges=true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      ytprocessor-network:
        aliases:
          - redis

  # Optional: Observability stack (for local development/testing)
  otel-collector:
    image: otel/opentelemetry-collector:0.88.0
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./infra/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - "4317:4317"  # OTLP gRPC
      - "55681:55681"  # Web UI (if enabled)
    security_opt:
      - no-new-privileges=true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    networks:
      ytprocessor-network:
        aliases:
          - otel-collector

  # Optional: API documentation (for development)
  swagger-ui:
    image: swaggerapi/swagger-ui:5.1.0  # Pinned version for stability
    container_name: swagger-ui
    restart: unless-stopped
    environment:
      URL: http://api:8000/openapi.json
    ports:
      - "8081:8080"
    # swagger-ui doesn't need resource limits or security context restrictions
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    depends_on:
      - api
    networks:
      ytprocessor-network:
        aliases:
          - swagger-ui

volumes:
  postgres_data:
    name: ytprocessor-postgres-data
  redis_data:
    name: ytprocessor-redis-data
  storage:
    name: ytprocessor-storage

networks:
  ytprocessor-network:
    name: ytprocessor-network
    # Enable network isolation and policies
    driver: bridge
    # Internal network for service-to-service communication only
    internal: false