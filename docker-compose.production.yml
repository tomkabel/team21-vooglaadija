# Production deployment with TLS
services:
  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/ssl:/etc/nginx/ssl:ro
      - ./infra/nginx/nginx.production.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - ytprocessor-network
