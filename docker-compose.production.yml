# ============================================
# Production Docker Compose Override
# Usage: docker compose -f docker-compose.yml -f docker-compose.production.yml up -d
#
# This file provides complete overrides for production deployment.
# The base docker-compose.yml provides defaults; this file overrides for production.
# ============================================

x-production-env: &production-env # Security settings
  CORS_ORIGINS: "https://youtube.tomabel.ee"
  COOKIE_SECURE: "True"

services:
  # ==========================================
  # Storage Init - Fix volume permissions
  # ==========================================
  storage-init:
    image: alpine:latest
    container_name: ytprocessor-storage-init
    restart: "no"
    volumes:
      - storage:/app/storage:rw
    command: |
      sh -c "
        echo 'Fixing storage permissions...';
        chown -R 1000:1000 /app/storage 2>/dev/null || true;
        mkdir -p /app/storage/downloads /app/storage/temp 2>/dev/null || true;
        chown -R 1000:1000 /app/storage/downloads /app/storage/temp 2>/dev/null || true;
        echo 'Storage permissions fixed';
        exit 0;
      "

  # ==========================================
  # API Service - Production Overrides
  # ==========================================
  api:
    environment:
      <<: *production-env
      # Ensure database URL uses docker network
      DATABASE_URL: "postgresql+asyncpg://postgres:${DB_PASSWORD}@db:5432/ytprocessor"
      # Redis with password auth
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
    # Remove direct port mapping - only access via nginx
    ports: []
    # Wait for storage to be initialized
    depends_on:
      storage-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; s=socket.socket(); s.settimeout(1); s.connect(('localhost', 8000)); s.close()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==========================================
  # Worker Service - Production Overrides
  # ==========================================
  worker:
    environment:
      <<: *production-env
      DATABASE_URL: "postgresql+asyncpg://postgres:${DB_PASSWORD}@db:5432/ytprocessor"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
    # Wait for storage initialization
    depends_on:
      storage-init:
        condition: service_completed_successfully

  # ==========================================
  # Nginx - Production SSL Configuration
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: ytprocessor-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # SSL certificates from Let's Encrypt - mount full tree so live symlinks resolve
      - ./infra/letsencrypt:/etc/letsencrypt:ro
      # Production nginx configuration with HTTPS, HTTP/2, secure headers
      - ./infra/nginx/nginx.production.conf:/etc/nginx/conf.d/default.conf:ro
      # Certbot ACME challenge path for Let's Encrypt
      - ./infra/certbot/data:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:80/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    networks:
      ytprocessor-network:
        aliases:
          - nginx
    profiles: [] # Always run in production

  # ==========================================
  # Certbot - Automatic SSL Renewal (Cloudflare DNS-01)
  # ==========================================
  certbot:
    image: certbot/dns-cloudflare
    container_name: ytprocessor-certbot
    restart: unless-stopped
    volumes:
      # SSL certificates - preserves full LetsEncrypt layout
      # Match nginx's LetsEncrypt mount so renewed certs are visible immediately
      - ./infra/letsencrypt:/etc/letsencrypt:rw
      # Cloudflare API credentials for DNS-01 challenge
      - ./infra/certbot/cloudflare.ini:/etc/letsencrypt/cloudflare.ini:ro
      # Mount Docker socket to signal nginx container on renewal
      - /var/run/docker.sock:/var/run/docker.sock:rw
    entrypoint: |
      /bin/sh -c '
        trap exit TERM;
        while :; do
          certbot renew \
            --dns-cloudflare \
            --dns-cloudflare-credentials /etc/letsencrypt/cloudflare.ini \
            --dns-cloudflare-propagation-seconds 30 \
            --deploy-hook "docker exec ytprocessor-nginx nginx -s reload 2>/dev/null || echo '"'"'nginx reload attempted'"'"'" || true;
          sleep 12h;
        done;
      '
    profiles: [] # Always run in production

  # ==========================================
  # Disable Non-Essential Services
  # ==========================================
  swagger-ui:
    profiles: ["nonprod"]
    restart: "no"
    deploy:
      replicas: 0

  otel-collector:
    profiles: ["nonprod"]
    restart: "no"
    deploy:
      replicas: 0
