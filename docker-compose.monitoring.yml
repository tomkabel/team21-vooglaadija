# NetData Monitoring Configuration for Vooglaadija
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
#
# This adds NetData agents to monitor:
#   - API container (CPU, memory, network, HTTP metrics)
#   - Worker container (CPU, memory, processes)
#   - PostgreSQL (via postgres_exporter pattern)
#   - Redis (built-in Redis metrics)
#   - Docker system-wide metrics

x-netdata-common: &netdata-common
  image: netdata/netdata:stable
  hostname: "{{.Service.Name}}"
  restart: unless-stopped
  cap_add:
    - SYS_PTRACE
    - SYS_ADMIN
  security_opt:
    - apparmor:unconfined
  volumes:
    - netdata-lib:/var/lib/netdata
    - netdata-cache:/var/cache/netdata
    - /etc/passwd:/host/etc/passwd:ro
    - /etc/group:/host/etc/group:ro
    - /etc/localtime:/host/etc/localtime:ro
    - /proc:/host/proc:ro
    - /sys:/host/sys:ro
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
  networks:
    - ytprocessor-network
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:19999/api/v1/info"]
    interval: 30s
    timeout: 10s
    retries: 5
    start_period: 60s

x-netdata-env: &netdata-env
  NETDATA_CLAIM_TOKEN: "${NETDATA_CLAIM_TOKEN:-}"
  NETDATA_CLAIM_URL: "${NETDATA_CLAIM_URL:-https://app.netdata.cloud}"
  NETDATA_CLAIM_ROOMS: "${NETDATA_CLAIM_ROOM:-}"
  NETDATA_INSECURE_SKIP_TLS_VERIFY: "false"

services:
  # ============================================
  # NetData Agent for API Container
  # ============================================
  netdata-api:
    <<: *netdata-common
    container_name: ytprocessor-netdata-api
    hostname: vooglaadija-api
    ports:
      - "19999:19999" # Expose NetData dashboard on localhost:19999
    volumes:
      - netdata-lib:/var/lib/netdata
      - netdata-cache:/var/cache/netdata
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      <<: *netdata-env
      # Tell NetData which container to monitor
      NETDATA_CGROUP_NAME: "ytprocessor-api"
    depends_on:
      - api

  # ============================================
  # NetData Agent for Worker Container
  # ============================================
  netdata-worker:
    <<: *netdata-common
    container_name: ytprocessor-netdata-worker
    hostname: vooglaadija-worker
    volumes:
      - netdata-lib:/var/lib/netdata
      - netdata-cache:/var/cache/netdata
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      <<: *netdata-env
      NETDATA_CGROUP_NAME: "ytprocessor-worker"
    depends_on:
      - worker

  # ============================================
  # NetData Agent for Database (DB) Container
  # ============================================
  netdata-db:
    <<: *netdata-common
    container_name: ytprocessor-netdata-db
    hostname: vooglaadija-db
    volumes:
      - netdata-lib:/var/lib/netdata
      - netdata-cache:/var/cache/netdata
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      <<: *netdata-env
      NETDATA_CGROUP_NAME: "ytprocessor-db"
    depends_on:
      - db

  # ============================================
  # NetData Agent for Redis Container
  # ============================================
  netdata-redis:
    <<: *netdata-common
    container_name: ytprocessor-netdata-redis
    hostname: vooglaadija-redis
    volumes:
      - netdata-lib:/var/lib/netdata
      - netdata-cache:/var/cache/netdata
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      <<: *netdata-env
      NETDATA_CGROUP_NAME: "ytprocessor-redis"
    depends_on:
      - redis

  # ============================================
  # Standalone NetData Parent (optional - for on-prem)
  # ============================================
  # Uncomment this section if running NetData without Cloud:
  #
  # netdata-parent:
  #   <<: *netdata-common
  #   container_name: ytprocessor-netdata-parent
  #   hostname: vooglaadija-parent
  #   ports:
  #     - "19999:19999"
  #   volumes:
  #     - netdata-lib:/var/lib/netdata
  #     - netdata-cache:/var/cache/netdata
  #     - /var/run/docker.sock:/var/run/docker.sock:ro
  #     - ./infra/netdata/health.d:/etc/netdata/health.d:ro
  #     - ./infra/netdata/go.d:/etc/netdata/go.d:ro

  # ============================================
  # PostgreSQL Exporter for Prometheus (optional)
  # ============================================
  # Uncomment if you want PostgreSQL metrics in Prometheus:
  #
  # postgres-exporter:
  #   image: prometheus/postgres-exporter:latest
  #   container_name: ytprocessor-postgres-exporter
  #   restart: unless-stopped
  #   environment:
  #     DATA_SOURCE_NAME: "postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?sslmode=disable"
  #   ports:
  #     - "9187:9187"
  #   networks:
  #     - ytprocessor-network
  #   depends_on:
  #     - db
  #   healthcheck:
  #     test: ["CMD-SHELL", "wget -q --spider http://localhost:9187 || exit 1"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

  # ============================================
  # Redis Exporter for Prometheus (optional)
  # ============================================
  # Uncomment if you want Redis metrics in Prometheus:
  #
  # redis-exporter:
  #   image: oliver006/redis_exporter:latest
  #   container_name: ytprocessor-redis-exporter
  #   restart: unless-stopped
  #   environment:
  #     REDIS_ADDR: "redis://:$${REDIS_PASSWORD}@redis:6379"
  #   ports:
  #     - "9121:9121"
  #   networks:
  #     - ytprocessor-network
  #   depends_on:
  #     - redis
  #   healthcheck:
  #     test: ["CMD-SHELL", "wget -q --spider http://localhost:9121 || exit 1"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

# NetData volumes for persistent configuration and data
volumes:
  netdata-lib:
    name: ytprocessor-netdata-lib
  netdata-cache:
    name: ytprocessor-netdata-cache

# Shared network - uncomment if standalone NetData Parent is enabled
# networks:
#   ytprocessor-network:
#     name: ytprocessor-network
