[alembic]
script_location = alembic
prepend_sys_path = app
version_path_separator = os

# NOTE: This URL is overridden by alembic/env.py at runtime.
# It is required by alembic but never actually used.
sqlalchemy.url = postgresql+asyncpg://placeholder:placeholder@localhost/placeholder

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
