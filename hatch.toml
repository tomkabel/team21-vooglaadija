# ============================================
# Global Hatch Configuration
# ============================================
# This file contains project-wide Hatch configuration
# that doesn't belong in pyproject.toml

# Project mode: local (default) - look for pyproject.toml in current directory
# Options: local | project | aware
[mode]
name = "local"

# Shell configuration for `hatch shell` command
[shell]
# Use bash as default shell
name = "bash"
# Initialize virtual environment in shell
init-script = ""

# Directory configuration
[dirs]
# Custom directory for environments (default: .hatch/envs)
# Uncomment to use custom location:
# [dirs.env]
# virtual = ".hatch/envs"

# Custom directory for building (default: .hatch/build)
# [dirs.build]
# target = ".hatch/build"

# Custom directory for caches (default: based on XDG_CACHE_HOME)
# [dirs.cache]
# shared = ".hatch/cache"

# Python installations directory
# [dirs.python]
# install = ".hatch/python"

# Terminal output styling
[terminal]
# Customize output colors
# [terminal.styles]
# debug = "cyan"
# error = "red"
# info = "green"
# success = "bold green"
# warning = "yellow"

# Use Unicode characters in output
# use-unicode = true

# Spinner style for long-running operations
# spinner = "dots"
