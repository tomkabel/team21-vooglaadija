name: Build staging Docker image

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@4574d27a4764455b4f63b60a0353c58d0116b7da

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@6524bf65af31da8d45b59e8c27de4bd072b392f5

      - name: Log in to the Container registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7ae155ce0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          version=$(grep -E '^version = ' pyproject.toml | cut -d'"' -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build and push API Docker image
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c038f3e463c
        with:
          context: .
          file: ./Dockerfile
          target: api
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}-staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker Docker image
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c038f3e463c
        with:
          context: .
          file: ./Dockerfile
          target: worker
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker:staging
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker:${{ steps.version.outputs.version }}-staging
          cache-from: type=gha
          cache-to: type=gha,mode=max
