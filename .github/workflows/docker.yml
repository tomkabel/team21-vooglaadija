name: Build release Docker image

on:
  workflow_dispatch:
  push:
    branches: [main]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683a

      - name: Set up QEMU
        uses: docker/setup-qemu-action@4574d27a4764455b4f63b60a0353c58d0116b7da

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@6524bf65af31da8d45b59e8c27de4bd072b392f5

      - name: Log in to the Container registry
        uses: docker/login-action@ba754150c9dbbaa912ae0ac3cfba43f84195cef2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Verify uv lockfile is up to date
        run: uv lock --check

      - name: Extract version
        id: version
        run: |
          version=$(grep -E '^version = ' pyproject.toml | cut -d'"' -f2)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build API image
        uses: docker/build-push-action@ef1fb9688fc3626d0fd5e462f502cbbdc6456feb
        with:
          context: .
          file: ./Dockerfile
          target: api
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
          provenance: true
          sbom: true
          build-args: GIT_SHA=${{ github.sha }}

      - name: Build Worker image
        uses: docker/build-push-action@ef1fb9688fc3626d0fd5e462f502cbbdc6456feb
        with:
          context: .
          file: ./Dockerfile
          target: worker
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:worker-latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:worker-${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:worker-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
          provenance: true
          sbom: true
          build-args: GIT_SHA=${{ github.sha }}
